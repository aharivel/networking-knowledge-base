<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetLearn — Networking Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="8" r="4" fill="#0af0ce"/>
                    <circle cx="8" cy="36" r="4" fill="#0af0ce" opacity="0.6"/>
                    <circle cx="40" cy="36" r="4" fill="#0af0ce" opacity="0.6"/>
                    <line x1="24" y1="12" x2="10" y2="33" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                    <line x1="24" y1="12" x2="38" y2="33" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                    <line x1="12" y1="36" x2="36" y2="36" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                </svg>
            </div>
            <p>Loading NetLearn...</p>
        </div>
    </div>

    <!-- Theme toggle: apply saved preference before paint to avoid flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('netlearn-theme') || 'light';
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>

    <!-- Docsify config MUST be before docsify script -->
    <script>
        window.$docsify = {
            el: '#app',
            name: 'NetLearn',
            repo: '',
            loadSidebar: true,
            homepage: 'index.md',
            subMaxLevel: 3,
            auto2top: true,
            search: {
                depth: 4,
                placeholder: '⌕ Search topics...',
                noData: 'No results found.',
                namespace: 'netlearn',
                pathNamespaces: /^\//
            },
            markdown: {
                renderer: {
                    code: function(code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            },
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        if (typeof mermaid !== 'undefined') {
                            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                        }
                    });

                    hook.ready(function() {
                        var sidebar = document.querySelector('.sidebar');
                        if (!sidebar) return;
                        var btn = document.createElement('button');
                        btn.className = 'theme-toggle';
                        btn.setAttribute('aria-label', 'Toggle dark mode');
                        btn.innerHTML = '<span class="toggle-icon"></span>';
                        sidebar.insertBefore(btn, sidebar.firstChild);

                        function applyTheme(theme) {
                            document.documentElement.setAttribute('data-theme', theme);
                            localStorage.setItem('netlearn-theme', theme);
                        }

                        btn.addEventListener('click', function() {
                            var current = document.documentElement.getAttribute('data-theme');
                            applyTheme(current === 'dark' ? 'light' : 'dark');
                        });
                    });
                }
            ]
        };
    </script>

    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                primaryColor: '#1a2744',
                primaryTextColor: '#e0e6ed',
                primaryBorderColor: '#0af0ce',
                lineColor: '#3d5a80',
                secondaryColor: '#0d1b2a',
                tertiaryColor: '#112240',
                fontFamily: 'DM Sans, sans-serif',
                fontSize: '14px'
            },
            flowchart: { useMaxWidth: true, curve: 'basis' },
            sequence: { useMaxWidth: true }
        });
    </script>
</body>
</html>
