<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NetLearn — Networking Knowledge Base</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="loading-screen">
            <div class="loading-icon">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                    <circle cx="24" cy="8" r="4" fill="#0af0ce"/>
                    <circle cx="8" cy="36" r="4" fill="#0af0ce" opacity="0.6"/>
                    <circle cx="40" cy="36" r="4" fill="#0af0ce" opacity="0.6"/>
                    <line x1="24" y1="12" x2="10" y2="33" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                    <line x1="24" y1="12" x2="38" y2="33" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                    <line x1="12" y1="36" x2="36" y2="36" stroke="#0af0ce" stroke-width="1.5" opacity="0.4"/>
                </svg>
            </div>
            <p>Loading NetLearn...</p>
        </div>
    </div>

    <!-- Theme toggle: apply saved preference before paint to avoid flash -->
    <script>
        (function() {
            var theme = localStorage.getItem('netlearn-theme') || 'light';
            if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();
    </script>

    <!-- Docsify config MUST be before docsify script -->
    <script>
        window.$docsify = {
            el: '#app',
            name: 'NetLearn',
            repo: '',
            loadSidebar: true,
            homepage: 'index.md',
            subMaxLevel: 3,
            auto2top: true,
            search: {
                depth: 4,
                placeholder: '⌕ Search topics...',
                noData: 'No results found.',
                namespace: 'netlearn',
                pathNamespaces: /^\//
            },
            markdown: {
                renderer: {
                    code: function(code, lang) {
                        if (lang === 'mermaid') {
                            return '<div class="mermaid">' + code + '</div>';
                        }
                        return this.origin.code.apply(this, arguments);
                    }
                }
            },
            plugins: [
                function(hook, vm) {
                    hook.doneEach(function() {
                        if (typeof mermaid !== 'undefined') {
                            mermaid.init(undefined, document.querySelectorAll('.mermaid'));
                        }

                        // Line rate calculator
                        var calc = document.getElementById('line-rate-calc');
                        if (calc) {
                            function formatPps(n) {
                                if (n >= 1e9) return (n / 1e9).toFixed(2) + ' Gpps';
                                if (n >= 1e6) return (n / 1e6).toFixed(2) + ' Mpps';
                                if (n >= 1e3) return (n / 1e3).toFixed(2) + ' Kpps';
                                return n.toFixed(0) + ' pps';
                            }
                            function formatBits(bps) {
                                if (bps >= 1e9) return (bps / 1e9).toFixed(2) + ' Gbps';
                                if (bps >= 1e6) return (bps / 1e6).toFixed(2) + ' Mbps';
                                if (bps >= 1e3) return (bps / 1e3).toFixed(2) + ' Kbps';
                                return bps.toFixed(0) + ' bps';
                            }
                            function calculate() {
                                var speed = parseFloat(document.getElementById('link-speed').value);
                                var unit = parseFloat(document.getElementById('speed-unit').value);
                                var pktSize = parseInt(document.getElementById('pkt-size').value);
                                if (isNaN(speed) || isNaN(pktSize) || speed <= 0 || pktSize < 64) {
                                    document.getElementById('result-pps').textContent = '—';
                                    document.getElementById('result-throughput').textContent = '—';
                                    document.getElementById('result-efficiency').textContent = '—';
                                    document.getElementById('result-wire-size').textContent = '—';
                                    document.getElementById('calc-breakdown').innerHTML = '';
                                    return;
                                }
                                var linkBps = speed * unit;
                                var overhead = 20;
                                var wireSize = pktSize + overhead;
                                var wireBits = wireSize * 8;
                                var pps = linkBps / wireBits;
                                var payloadBps = pps * pktSize * 8;
                                var efficiency = (pktSize / wireSize) * 100;
                                document.getElementById('result-pps').textContent = formatPps(pps);
                                document.getElementById('result-throughput').textContent = formatBits(payloadBps);
                                document.getElementById('result-efficiency').textContent = efficiency.toFixed(1) + '%';
                                document.getElementById('result-wire-size').textContent = wireSize + ' bytes';
                                document.getElementById('calc-breakdown').innerHTML =
                                    '<span class="hl">Formula:</span> pps = link_speed / (wire_size × 8)<br>' +
                                    '<span class="hl">Wire size:</span> ' + pktSize + 'B (packet) + 7B (preamble) + 1B (SFD) + 12B (IFG) = <span class="hl">' + wireSize + ' bytes</span><br>' +
                                    '<span class="hl">Calculation:</span> ' + formatBits(linkBps) + ' / (' + wireSize + ' × 8) = ' + formatBits(linkBps) + ' / ' + wireBits + ' bits = <span class="hl">' + formatPps(pps) + '</span>';
                            }
                            document.getElementById('link-speed').addEventListener('input', calculate);
                            document.getElementById('pkt-size').addEventListener('input', calculate);
                            document.getElementById('speed-unit').addEventListener('change', calculate);
                            var presets = document.querySelectorAll('.pkt-presets button[data-size]');
                            presets.forEach(function(btn) {
                                btn.addEventListener('click', function() {
                                    document.getElementById('pkt-size').value = this.getAttribute('data-size');
                                    calculate();
                                });
                            });
                            calculate();
                        }
                    });

                    hook.ready(function() {
                        var sidebar = document.querySelector('.sidebar');
                        if (!sidebar) return;
                        var btn = document.createElement('button');
                        btn.className = 'theme-toggle';
                        btn.setAttribute('aria-label', 'Toggle dark mode');
                        btn.innerHTML = '<span class="toggle-icon"></span>';
                        var appName = sidebar.querySelector('.app-name-link');
                        if (appName && appName.parentNode) {
                            appName.parentNode.insertBefore(btn, appName.nextSibling);
                        } else {
                            sidebar.appendChild(btn);
                        }

                        function applyTheme(theme) {
                            document.documentElement.setAttribute('data-theme', theme);
                            localStorage.setItem('netlearn-theme', theme);
                        }

                        btn.addEventListener('click', function() {
                            var current = document.documentElement.getAttribute('data-theme');
                            applyTheme(current === 'dark' ? 'light' : 'dark');
                        });
                    });
                }
            ]
        };
    </script>

    <!-- Docsify core -->
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-go.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
        mermaid.initialize({
            startOnLoad: false,
            theme: 'base',
            themeVariables: {
                primaryColor: '#1a2744',
                primaryTextColor: '#e0e6ed',
                primaryBorderColor: '#0af0ce',
                lineColor: '#3d5a80',
                secondaryColor: '#0d1b2a',
                tertiaryColor: '#112240',
                fontFamily: 'DM Sans, sans-serif',
                fontSize: '14px'
            },
            flowchart: { useMaxWidth: true, curve: 'basis' },
            sequence: { useMaxWidth: true }
        });
    </script>
</body>
</html>
